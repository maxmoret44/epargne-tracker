<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Épargne Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --orange: #f59e0b;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --grey: #94a3b8;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NAV */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      display: flex;
      border-top: 1px solid var(--surface2);
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-inner {
      display: flex; width: 100%;
    }
    .nav button {
      flex: 1; background: none; border: none; color: var(--text2);
      padding: 12px 0; font-size: 11px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: color 0.2s;
    }
    .nav button.active { color: var(--accent); }
    .nav button svg { width: 22px; height: 22px; }
    .nav-label { transition: opacity 0.2s; }

    /* PAGES */
    .page { display: none; padding: 16px 16px 80px; max-width: 900px; margin: 0 auto; }
    .page.active { display: block; }

    /* HEADER */
    .header { text-align: center; padding: 20px 0 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .total {
      font-size: 36px; font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin: 8px 0;
    }
    .header .sub { color: var(--text2); font-size: 13px; }
    .gain { font-size: 14px; font-weight: 600; margin-top: 4px; }
    .gain.pos { color: var(--green); }
    .gain.neg { color: var(--red); }

    /* CARDS */
    .cards { display: grid; gap: 10px; margin: 16px 0; }
    .split-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0; }
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .card .label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .card .value { font-size: 20px; font-weight: 700; }

    .account-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      transition: border 0.2s;
      border: 1px solid transparent;
    }
    .account-card.clickable { cursor: pointer; }
    .account-card.clickable:hover { border-color: var(--accent); }
    .account-card .left { display: flex; align-items: center; gap: 10px; }
    .account-card .dot { width: 10px; height: 10px; border-radius: 50%; }
    .account-card .name { font-size: 13px; font-weight: 500; }
    .account-card .amount { font-size: 15px; font-weight: 600; }

    /* CHART */
    .chart-container {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin: 16px 0;
      position: relative;
    }
    .chart-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .chart-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--text2);
      font-weight: 600;
    }
    .chart-title svg { width: 18px; height: 18px; opacity: 0.7; }
    .chart-visible-total {
      font-size: 16px; font-weight: 700; color: var(--green);
    }
    .chart-expand-btn {
      background: none; border: none; color: var(--text2); cursor: pointer;
      padding: 4px; border-radius: 6px; transition: color 0.2s;
      display: flex; align-items: center;
    }
    .chart-expand-btn:hover { color: var(--text); }
    .chart-expand-btn svg { width: 18px; height: 18px; }
    .chart-container canvas { width: 100% !important; }

    /* CHART LEGEND (checkboxes) */
    .chart-legend {
      display: flex; flex-wrap: wrap; gap: 6px 14px;
      margin-top: 14px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 6px;
      cursor: pointer; font-size: 12px; color: var(--text2);
      user-select: none;
    }
    .legend-item input[type="checkbox"] {
      width: 14px; height: 14px; cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }
    .legend-swatch {
      width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
    }

    /* CHART FULLSCREEN OVERLAY */
    .chart-fs-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: none; flex-direction: column;
      padding: 16px 16px env(safe-area-inset-bottom);
    }
    .chart-fs-overlay.visible { display: flex; }
    .chart-fs-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .chart-fs-close {
      background: var(--surface2); border: none; color: var(--text);
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .chart-fs-content {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }
    .chart-fs-content canvas { flex: 1; max-height: calc(100vh - 160px); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text2);
      margin-bottom: 6px; font-weight: 500;
    }
    .form-group label svg { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.7; }
    .form-group input {
      width: 100%; padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--surface2);
      border-radius: var(--radius);
      color: var(--text); font-size: 15px;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .cristina-toggle {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-radius: var(--radius);
      padding: 12px 14px; margin-bottom: 16px; cursor: pointer;
      border: 1px solid var(--surface2);
    }
    .cristina-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); }
    .cristina-toggle span { font-size: 13px; color: var(--text2); }
    .cristina-toggle .val { color: var(--text); font-weight: 600; margin-left: auto; }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: var(--radius);
      color: white; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--surface2);
      margin-top: 10px;
    }
    .btn-warning {
      background: linear-gradient(135deg, #92400e, #78350f);
      margin-top: 10px;
    }

    /* STATUS */
    .status {
      text-align: center; padding: 10px;
      border-radius: var(--radius); margin-top: 12px;
      font-size: 13px; display: none;
    }
    .status.success { display: block; background: #064e3b; color: var(--green); }
    .status.error { display: block; background: #7f1d1d; color: var(--red); }
    .status.info { display: block; background: var(--surface2); color: var(--text2); }

    /* HISTORY TABLE */
    .history-table {
      width: 100%; overflow-x: auto;
      background: var(--surface);
      border-radius: var(--radius);
      margin-top: 16px;
    }
    .history-table table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
    .history-table th {
      background: var(--surface2); padding: 10px 8px;
      text-align: right; font-weight: 600; color: var(--text2);
      position: sticky; top: 0;
    }
    .history-table th:first-child { text-align: left; }
    .history-table td { padding: 8px; text-align: right; border-bottom: 1px solid var(--surface2); }
    .history-table td:first-child { text-align: left; color: var(--text2); }
    .history-table td:last-child { color: var(--accent); font-weight: 600; }

    /* SETTINGS */
    .setting-item {
      background: var(--surface); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
    }
    .setting-item label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
    .setting-item input {
      width: 100%; padding: 10px 12px;
      background: var(--bg); border: 1px solid var(--surface2);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: inherit;
    }
    .setting-item input:focus { outline: none; border-color: var(--accent); }
    .setting-item p { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }
    .sync-status { text-align: center; padding: 12px; color: var(--text2); font-size: 12px; }

    /* LOADING */
    .loading { display: flex; justify-content: center; align-items: center; padding: 40px; color: var(--text2); }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* INJECTION TOGGLE */
    .injection-section { margin: 16px 0; }
    .injection-toggle {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border-radius: var(--radius);
      padding: 12px 14px; cursor: pointer;
      border: 1px solid var(--surface2);
      margin-bottom: 12px;
    }
    .injection-toggle input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--orange); }
    .injection-toggle span { font-size: 13px; color: var(--text2); }
    .injection-fields {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      border: 1px solid var(--orange);
      margin-bottom: 16px;
    }
    .injection-fields.visible { display: block; }
    .injection-fields .form-group { margin-bottom: 10px; }
    .injection-fields .form-group:last-child { margin-bottom: 0; }
    .injection-fields .form-group label { font-size: 12px; }
    .injection-fields .form-group input { padding: 8px 12px; font-size: 13px; background: var(--bg); }

    /* PEA MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 150;
      display: none; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 600px;
      padding: 20px;
      max-height: 85vh; overflow-y: auto;
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 600; font-size: 15px; margin-bottom: 16px;
    }
    .modal-close-btn {
      background: var(--surface2); border: none; color: var(--text);
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 16px; cursor: pointer; line-height: 1;
    }
    .pea-holding-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--surface2);
      font-size: 13px;
    }
    .pea-holding-row:last-child { border-bottom: none; }
    .modal-add-row {
      display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap;
    }
    .modal-add-row input {
      background: var(--bg); border: 1px solid var(--surface2);
      border-radius: 8px; color: var(--text); padding: 8px 10px;
      font-size: 13px; font-family: inherit; flex: 1; min-width: 80px;
    }
    .modal-add-row input:focus { outline: none; border-color: var(--accent); }
    .modal-add-btn {
      background: var(--accent); border: none; border-radius: 8px;
      color: white; padding: 8px 16px; cursor: pointer; font-size: 15px; font-weight: 600;
    }
    .pea-remove-btn {
      background: none; border: none; color: var(--red);
      cursor: pointer; font-size: 18px; padding: 0 4px; line-height: 1;
    }
    .pea-total-line {
      text-align: right; margin-top: 14px;
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .pea-fetch-status { font-size: 11px; color: var(--text2); margin-top: 6px; text-align: center; }

    /* RESPONSIVE DESKTOP */
    @media (min-width: 768px) {
      .nav {
        position: fixed; top: 0; bottom: auto; left: 0; right: 0;
        border-top: none; border-bottom: 1px solid var(--surface2);
        padding-bottom: 0; justify-content: center;
      }
      .nav-inner { max-width: 960px; margin: 0 auto; width: 100%; }
      .nav button { flex-direction: row; gap: 8px; padding: 14px 0; }
      .nav-label { opacity: 0; max-width: 0; overflow: hidden; white-space: nowrap; }
      .nav button:hover .nav-label,
      .nav button.active .nav-label { opacity: 1; max-width: 120px; font-size: 13px; }
      .page { padding: 80px 24px 24px; max-width: 960px; }
      .cards { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
      .header .total { font-size: 48px; }
      .modal-box { border-radius: var(--radius); margin-bottom: 40px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-inner">
      <button class="active" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">Dashboard</span>
      </button>
      <button data-page="add">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <span class="nav-label">Mettre à jour</span>
      </button>
      <button data-page="history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-label">Historique</span>
      </button>
      <button data-page="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="nav-label">Config</span>
      </button>
    </div>
  </nav>

  <!-- DASHBOARD -->
  <div id="dashboard" class="page active">
    <div class="header">
      <h1>Total Épargne</h1>
      <div class="total" id="totalEpargne">--</div>
      <div class="sub">Dernière mise à jour : <span id="lastUpdate">--</span></div>
    </div>

    <div class="split-cards">
      <div class="card">
        <div class="label">Max</div>
        <div class="value" id="totalMax">--</div>
        <div class="gain" id="gainTotal" style="font-size:12px;margin-top:4px"></div>
      </div>
      <div class="card">
        <div class="label">Cristina</div>
        <div class="value" id="totalCristina">--</div>
      </div>
    </div>

    <div class="cards" id="accountCards"></div>

    <!-- Area Chart -->
    <div class="chart-container" id="containerArea">
      <div class="chart-header">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Progression
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="chart-visible-total" id="areaTotalLabel"></span>
          <button class="chart-expand-btn" onclick="expandChart('area')" title="Plein écran">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
      <canvas id="chartArea" height="200"></canvas>
      <div class="chart-legend" id="legendArea"></div>
    </div>

    <!-- Donut Chart -->
    <div class="chart-container" id="containerDonut">
      <div class="chart-header">
        <div class="chart-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
          Répartition actuelle
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="chart-visible-total" id="donutTotalLabel"></span>
          <button class="chart-expand-btn" onclick="expandChart('donut')" title="Plein écran">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          </button>
        </div>
      </div>
      <canvas id="chartDonut" height="220"></canvas>
      <div class="chart-legend" id="legendDonut"></div>
    </div>

    <div class="loading" id="dashLoading">
      <div class="spinner"></div> Chargement...
    </div>
  </div>

  <!-- FULLSCREEN CHART OVERLAY -->
  <div id="chartFullscreen" class="chart-fs-overlay">
    <div class="chart-fs-header">
      <div class="chart-title" id="fsTitleLabel"></div>
      <button class="chart-fs-close" onclick="closeFullscreen()">✕</button>
    </div>
    <div class="chart-fs-content">
      <canvas id="chartFs" style="width:100%;height:100%"></canvas>
      <div class="chart-legend" id="legendFs" style="margin-top:14px"></div>
    </div>
    <div style="text-align:right;font-size:13px;font-weight:700;color:var(--text);margin-top:8px" id="fsTotalLabel"></div>
  </div>

  <!-- ADD FORM -->
  <div id="add" class="page">
    <div class="header">
      <h1>Mise à jour de l'épargne</h1>
    </div>

    <div class="form-group">
      <label><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Date</label>
      <input type="date" id="fDate">
    </div>

    <div class="form-group">
      <label><svg viewBox="0 0 24 24" fill="none" stroke="#c2185b" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>BoursoVie</label>
      <input type="number" id="fBoursovie" step="0.01" placeholder="0.00">
    </div>

    <div class="form-group">
      <label><svg viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2"><path d="M12 1v4M12 19v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M1 12h4M19 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="4"/></svg>TR CTO (BTC)</label>
      <input type="number" id="fCto" step="0.01" placeholder="0.00">
    </div>

    <div class="form-group">
      <label><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>TR PEA</label>
      <input type="number" id="fPea" step="0.01" placeholder="0.00">
    </div>

    <div class="form-group">
      <label><svg viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>CE Livret A</label>
      <input type="number" id="fLivret" step="0.01" placeholder="0.00">
    </div>

    <div class="form-group">

<script>
// ============== CONFIG ==============
const CONFIG_KEY = 'epargne_config';
const DATA_KEY = 'epargne_data';
const INVESTED_KEY = 'epargne_invested';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

let tokenClient;
let gisInited = false;
let accessToken = sessionStorage.getItem('epargne_access_token');

function getConfig() {
  const raw = localStorage.getItem(CONFIG_KEY);
  return raw ? JSON.parse(raw) : {
    targetId: '1CCKFA_14_e5ioCTuTRe1tIZtffGwm_YcYtUeEZbHwRU',
    apiKey: '',
    clientId: '',
    targetTab: 'Feuille 1'
  };
}

function saveConfig() {
  const cfg = {
    targetId: document.getElementById('cfgTargetId').value.trim(),
    apiKey: document.getElementById('cfgApiKey').value.trim(),
    clientId: document.getElementById('cfgClientId').value.trim(),
    targetTab: document.getElementById('cfgTargetTab').value.trim() || 'Feuille 1',
  };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
  if (cfg.clientId) localStorage.setItem('epargne_client_id', cfg.clientId);
  document.getElementById('syncStatus').textContent = 'Configuration sauvegardée !';
  loadData();
}

function loadConfig() {
  const cfg = getConfig();
  document.getElementById('cfgTargetId').value = cfg.targetId;
  document.getElementById('cfgApiKey').value = cfg.apiKey;
  document.getElementById('cfgClientId').value = cfg.clientId;
  document.getElementById('cfgTargetTab').value = cfg.targetTab;
}

// ============== GOOGLE SHEETS API ==============
async function sheetsRead(sheetId, range) {
  const cfg = getConfig();
  if (!sheetId) return null;
  if (!cfg.apiKey && !accessToken) return null;

  let url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(range)}?valueRenderOption=UNFORMATTED_VALUE&dateTimeRenderOption=FORMATTED_STRING`;
  const headers = {};

  if (accessToken) {
    headers['Authorization'] = `Bearer ${accessToken}`;
  } else {
    url += `&key=${cfg.apiKey}`;
  }

  const res = await fetch(url, { headers });
  if (!res.ok) {
    const body = await res.text();
    console.error(`Sheets API ${res.status}:`, body);
    if (res.status === 401 || (res.status === 403 && accessToken)) {
      accessToken = null;
      sessionStorage.removeItem('epargne_access_token');
    }
    throw new Error(`Sheets API error: ${res.status}`);
  }
  return (await res.json()).values || [];
}

async function sheetsAppend(range, values) {
  const cfg = getConfig();
  if (!cfg.targetId) throw new Error('Sheet cible manquant');
  if (!accessToken) throw new Error('Non connecté à Google');

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.targetId}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });
  if (!res.ok) throw new Error(`Append error: ${res.status}`);
  return res.json();
}

async function sheetsUpdate(sheetId, range, values) {
  if (!sheetId) throw new Error('Sheet ID manquant');
  if (!accessToken) throw new Error('Non connecté à Google');

  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ values })
  });
  if (!res.ok) throw new Error(`Update error: ${res.status}`);
  return res.json();
}

// ============== GOOGLE AUTH ==============
function updateConnectionStatus(connected, label) {
  const el = document.getElementById('connectionStatus');
  el.textContent = label || (connected ? 'Connecté !' : 'Non connecté');
  el.style.color = connected ? 'var(--green)' : 'var(--text2)';
}

function connectGoogle() {
  const cfg = getConfig();
  const clientId = cfg.clientId || localStorage.getItem('epargne_client_id');
  if (!clientId) {
    alert('Veuillez d\'abord configurer le Client ID OAuth2 dans les paramètres.');
    return;
  }

  if (typeof google === 'undefined' || !google.accounts) {
    alert('Chargement de Google Identity Services... Veuillez réessayer.');
    loadGIS();
    return;
  }

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.error) {
        console.error('Auth error:', resp);
        updateConnectionStatus(false, 'Erreur: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      sessionStorage.setItem('epargne_access_token', accessToken);
      updateConnectionStatus(true);
      loadData();
    }
  });

  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function trySilentAuth(clientId) {
  try {
    const tc = google.accounts.oauth2.initTokenClient({
      client_id: clientId,
      scope: SCOPES,
      callback: (resp) => {
        if (resp.error) return;
        accessToken = resp.access_token;
        sessionStorage.setItem('epargne_access_token', accessToken);
        updateConnectionStatus(true, 'Connecté (auto)');
        loadData();
      },
      error_callback: () => {}
    });
    tc.requestAccessToken({ prompt: '' });
  } catch(e) {
    console.log('Silent auth unavailable:', e);
  }
}

function loadGIS() {
  if (document.getElementById('gis-script')) return;
  const s = document.createElement('script');
  s.id = 'gis-script';
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = () => {
    gisInited = true;
    if (!accessToken) {
      const cfg = getConfig();
      const clientId = cfg.clientId || localStorage.getItem('epargne_client_id');
      if (clientId) trySilentAuth(clientId);
    }
  };
  document.head.appendChild(s);
}

// ============== DATA ==============
let allData = [];
let cristinaData = [];
let investedAmounts = {};
let totalInjections = {};

async function loadData() {
  const cfg = getConfig();
  if (!cfg.apiKey && !accessToken) {
    document.getElementById('dashLoading').innerHTML = '<span style="color:var(--text2)">Allez dans Config > Connecter Google</span>';
    return;
  }
  if (!cfg.targetId) {
    document.getElementById('dashLoading').innerHTML = '<span style="color:var(--text2)">Configurez le Sheet ID dans Config</span>';
    return;
  }

  try {
    const targetRows = cfg.targetId
      ? await sheetsRead(cfg.targetId, `'${cfg.targetTab}'!A2:M`)
      : [];

    const tgtFiltered = (targetRows || []).filter(r => r[0]);
    allData = tgtFiltered.map(r => [r[0], r[1], r[2], r[3], r[4], r[5], r[6]]);
    cristinaData = tgtFiltered.map(r => parseFloat(r[7]) || 0);

    totalInjections = { boursovie: 0, cto: 0, pea: 0, livret: 0, cash: 0 };
    tgtFiltered.forEach(r => {
      totalInjections.boursovie += parseFloat(r[8])  || 0;
      totalInjections.cto       += parseFloat(r[9])  || 0;
      totalInjections.pea       += parseFloat(r[10]) || 0;
      totalInjections.livret    += parseFloat(r[11]) || 0;
      totalInjections.cash      += parseFloat(r[12]) || 0;
    });

    // investedAmounts: load from persistent cache (set during initial source migration)
    const cachedInvested = localStorage.getItem(INVESTED_KEY);
    if (cachedInvested) {
      investedAmounts = JSON.parse(cachedInvested);
    }

    localStorage.setItem(DATA_KEY, JSON.stringify({ allData, cristinaData, investedAmounts, totalInjections, ts: Date.now() }));

    renderDashboard();
    renderHistory();
    prefillForm();
  } catch(e) {
    console.error('Load error:', e);
    const cached = localStorage.getItem(DATA_KEY);
    if (cached) {
      const d = JSON.parse(cached);
      allData = d.allData || [];
      cristinaData = d.cristinaData || [];
      investedAmounts = d.investedAmounts || {};
      totalInjections = d.totalInjections || {};
      renderDashboard();
      renderHistory();
      prefillForm();
    } else {
      const msg = e.message.includes('403') || e.message.includes('401')
        ? 'Session expirée. Allez dans Config > Connecter Google'
        : e.message;
      document.getElementById('dashLoading').innerHTML = `<span style="color:var(--red)">Erreur: ${msg}</span>`;
    }
  }
}

// ============== RENDER DASHBOARD ==============
const ACCOUNTS = [
  { key: 'boursovie', name: 'BoursoVie',    idx: 1, color: '#c2185b' },
  { key: 'cto',       name: 'TR CTO (BTC)', idx: 2, color: '#f59e0b' },
  { key: 'pea',       name: 'TR PEA',       idx: 3, color: '#3b82f6' },
  { key: 'livret',    name: 'CE Livret A',  idx: 4, color: '#ef4444' },
  { key: 'cash',      name: 'TR Cash',      idx: 5, color: '#94a3b8' },
];

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);
}

function renderDashboard() {
  if (!allData.length) return;
  const dashLoad = document.getElementById('dashLoading');
  if (dashLoad) dashLoad.style.display = 'none';

  const last = allData[allData.length - 1];
  const totalMax = parseFloat(last[6]) || 0;
  const cristinaLast = cristinaData.length > 0 ? cristinaData[cristinaData.length - 1] : 0;
  const totalEpargne = totalMax + cristinaLast;

  document.getElementById('totalEpargne').textContent = fmt(totalEpargne);
  document.getElementById('totalMax').textContent = fmt(totalMax);
  document.getElementById('totalCristina').textContent = fmt(cristinaLast);

  // Performance: TR Cash not counted (invested = current value)
  const currentCash = parseFloat(last[5]) || 0;
  const totalInvested =
    (investedAmounts.boursovie || 0) + (totalInjections.boursovie || 0) +
    (investedAmounts.cto       || 0) + (totalInjections.cto       || 0) +
    (investedAmounts.pea       || 0) + (totalInjections.pea       || 0) +
    (investedAmounts.livret    || 0) + (totalInjections.livret    || 0) +
    currentCash;

  if (totalInvested > 0) {
    const gain = totalMax - totalInvested;
    portfolioGainPositive = gain >= 0;
    const pct = ((gain / totalInvested) * 100).toFixed(2);
    const el = document.getElementById('gainTotal');
    el.textContent = `${gain >= 0 ? '+' : ''}${fmt(gain)} (${gain >= 0 ? '+' : ''}${pct}%)`;
    el.className = `gain ${gain >= 0 ? 'pos' : 'neg'}`;
    // Pass gain color to donut canvas for center text
    const donutCanvas = document.getElementById('chartDonut');
    if (donutCanvas) donutCanvas.dataset.gainColor = gain >= 0 ? '#10b981' : '#ef4444';
  }

  const dateStr = last[0];
  document.getElementById('lastUpdate').textContent = typeof dateStr === 'string' ? dateStr : new Date(dateStr).toLocaleDateString('fr-FR');

  // Account cards
  const cardsHtml = ACCOUNTS.map(a => {
    const val = parseFloat(last[a.idx]) || 0;
    const inv = (investedAmounts[a.key] || 0) + (totalInjections[a.key] || 0);
    const accountGain = a.key === 'cash' ? 0 : val - inv;
    const accountPct = (inv > 0 && a.key !== 'cash') ? ((accountGain / inv) * 100).toFixed(1) : null;
    const isClickable = a.key === 'pea';
    return `<div class="account-card${isClickable ? ' clickable' : ''}" ${isClickable ? 'onclick="openPeaModal()"' : ''}>
      <div class="left">
        <div class="dot" style="background:${a.color}"></div>
        <span class="name">${a.name}</span>
        ${isClickable ? '<svg viewBox="0 0 24 24" fill="none" stroke="var(--text2)" stroke-width="2" style="width:14px;height:14px;opacity:0.5"><polyline points="9 18 15 12 9 6"/></svg>' : ''}
      </div>
      <div style="text-align:right">
        <span class="amount">${fmt(val)}</span>
        ${accountPct !== null ? `<div style="font-size:11px;color:${accountGain >= 0 ? 'var(--green)' : 'var(--red)'}">${accountGain >= 0 ? '+' : ''}${accountPct}%</div>` : ''}
      </div>
    </div>`;
  }).join('');
  document.getElementById('accountCards').innerHTML = cardsHtml;

  renderCharts();
}

// ============== CHARTS ==============
let chartArea = null;
let chartDonut = null;
let chartFs = null;
let fsMode = null; // 'area' or 'donut'
let portfolioGainPositive = true; // set in renderDashboard, used by chart totals

// Track donut series visibility separately (Chart.js getDataVisibility timing is unreliable)
const donutVisibility = {};

function updateDonutTotal(labelId, data, visKey) {
  const el = document.getElementById(labelId);
  if (!el) return;
  let total = 0;
  data.forEach((v, i) => {
    if (donutVisibility[visKey + i] !== false) total += parseFloat(v) || 0;
  });
  el.textContent = fmt(total);
  el.style.color = portfolioGainPositive ? 'var(--green)' : 'var(--red)';
}

function styledCheckbox(cb, color, checked) {
  cb.style.cssText = `
    appearance:none; -webkit-appearance:none;
    width:12px; height:12px; border-radius:2px;
    border:2px solid ${color};
    background:${checked ? color : 'transparent'};
    cursor:pointer; flex-shrink:0; transition:background 0.15s;
  `;
}

function buildAreaLegend(chart, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  chart.data.datasets.forEach((ds, i) => {
    const color = Array.isArray(ds.borderColor) ? ds.borderColor[0] : ds.borderColor;
    const item = document.createElement('label');
    item.className = 'legend-item';
    item.innerHTML = `<input type="checkbox" checked><span>${ds.label}</span>`;
    const cb = item.querySelector('input');
    styledCheckbox(cb, color, true);
    cb.addEventListener('change', e => {
      styledCheckbox(e.target, color, e.target.checked);
      chart.setDatasetVisibility(i, e.target.checked);
      chart.update();
      updateAreaTotal(chart, containerId === 'legendFs' ? 'fsTotalLabel' : 'areaTotalLabel');
    });
    container.appendChild(item);
  });
  updateAreaTotal(chart, containerId === 'legendFs' ? 'fsTotalLabel' : 'areaTotalLabel');
}

function buildDonutLegend(chart, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  const totalLabelId = containerId === 'legendFs' ? 'fsTotalLabel' : 'donutTotalLabel';
  const data = chart.data.datasets[0].data;
  // Init visibility state
  data.forEach((_, i) => { donutVisibility[containerId + i] = true; });
  chart.data.labels.forEach((label, i) => {
    const color = chart.data.datasets[0].backgroundColor[i];
    const item = document.createElement('label');
    item.className = 'legend-item';
    item.innerHTML = `<input type="checkbox" checked><span>${label}</span>`;
    const cb = item.querySelector('input');
    styledCheckbox(cb, color, true);
    cb.addEventListener('change', e => {
      styledCheckbox(e.target, color, e.target.checked);
      donutVisibility[containerId + i] = e.target.checked;
      chart.toggleDataVisibility(i);
      chart.update();
      updateDonutTotal(totalLabelId, data, containerId);
    });
    container.appendChild(item);
  });
  updateDonutTotal(totalLabelId, data, containerId);
}

function updateAreaTotal(chart, labelId) {
  const labelEl = document.getElementById(labelId);
  if (!labelEl) return;
  if (!allData.length) return;
  const lastIdx = allData.length - 1;
  let total = 0, visibleInvested = 0;
  chart.data.datasets.forEach((ds, i) => {
    if (chart.isDatasetVisible(i)) {
      const val = ds.data[lastIdx] || 0;
      total += val;
      const acc = ACCOUNTS[i];
      if (acc) {
        if (acc.key === 'cash') {
          visibleInvested += val; // cash: invested = current value
        } else {
          visibleInvested += (investedAmounts[acc.key] || 0) + (totalInjections[acc.key] || 0);
        }
      } else {
        // Cristina (or extra dataset): invested = current value (gain ignored)
        visibleInvested += val;
      }
    }
  });
  const gain = total - visibleInvested;
  const pct = visibleInvested > 0 ? ((gain / visibleInvested) * 100).toFixed(1) : null;
  const sign = gain >= 0 ? '+' : '';
  const gainColor = gain >= 0 ? 'var(--green)' : 'var(--red)';
  const gainStr = pct !== null ? ` <span style="font-size:0.75em;color:${gainColor}">${sign}${fmt(gain)} (${sign}${pct}%)</span>` : '';
  labelEl.innerHTML = fmt(total) + gainStr;
  labelEl.style.color = portfolioGainPositive ? 'var(--green)' : 'var(--red)';
}

function getChartOptions(type) {
  const tooltipDefaults = {
    backgroundColor: '#1e293b',
    titleColor: '#f1f5f9',
    bodyColor: '#94a3b8',
    borderColor: '#334155',
    borderWidth: 1,
    cornerRadius: 8,
    padding: 10,
    titleFont: { family: 'Inter', weight: '600' },
    bodyFont: { family: 'Inter' },
  };

  if (type === 'line') {
    return {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          ...tooltipDefaults,
          callbacks: { label: ctx => ` ${ctx.dataset.label}: ${fmt(ctx.raw)}` }
        }
      },
      scales: {
        x: { ticks: { color: '#64748b', maxTicksLimit: 6, font: { size: 10 } }, grid: { display: false } },
        y: {
          stacked: true,
          ticks: { color: '#64748b', callback: v => fmt(v), font: { size: 10 } },
          grid: { color: '#1e293b' }
        }
      }
    };
  }

  return {
    responsive: type !== 'doughnut' || undefined,
    cutout: '65%',
    plugins: {
      legend: { display: false },
      tooltip: {
        ...tooltipDefaults,
        callbacks: { label: ctx => ` ${ctx.label}: ${fmt(ctx.raw)}` }
      }
    }
  };
}

function renderCharts() {
  if (!allData.length) return;

  const labels = allData.map(r => {
    const d = r[0];
    if (typeof d === 'string' && d.includes('/')) return d;
    try { return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }); }
    catch { return d; }

async function submitForm() {
  const status = document.getElementById('formStatus');
  const btn = document.getElementById('btnSubmit');
  status.className = 'status';
  status.textContent = '';

  const date = document.getElementById('fDate').value;
  if (!date) { status.className = 'status error'; status.textContent = 'Veuillez saisir une date.'; return; }

  const donnees = {
    boursovie: parseFloat(document.getElementById('fBoursovie').value) || 0,
    cto:       parseFloat(document.getElementById('fCto').value)       || 0,
    pea:       parseFloat(document.getElementById('fPea').value)       || 0,
    livret:    parseFloat(document.getElementById('fLivret').value)    || 0,
    cash:      parseFloat(document.getElementById('fCash').value)      || 0,
    cristina:  parseFloat(document.getElementById('fCristina').value)  || 0,
  };

  const injections = {
    boursovie: parseFloat(document.getElementById('injBoursovie').value) || 0,
    cto:       parseFloat(document.getElementById('injCto').value)       || 0,
    pea:       parseFloat(document.getElementById('injPea').value)       || 0,
    livret:    parseFloat(document.getElementById('injLivret').value)    || 0,
  };

  const total = donnees.boursovie + donnees.cto + donnees.pea + donnees.livret + donnees.cash;
  const cfg = getConfig();

  btn.disabled = true;
  btn.textContent = 'Envoi en cours...';

  try {
    if (!accessToken) throw new Error('Non connecté. Allez dans Config > Connecter Google.');

    // Columns: Date|Bourso|CTO|PEA|Livret|Cash|Total|Cristina|InjBourso|InjCTO|InjPEA|InjLivret|InjCash(empty)
    const newRow = [
      date,
      donnees.boursovie, donnees.cto, donnees.pea, donnees.livret, donnees.cash,
      total, donnees.cristina,
      injections.boursovie || '', injections.cto || '', injections.pea || '', injections.livret || '', ''
    ];

    await sheetsAppend(`'${cfg.targetTab}'!A:M`, [newRow]);

    status.className = 'status success';
    status.textContent = `Données ajoutées ! Total Max: ${fmt(total)}`;

    ['fBoursovie','fCto','fPea','fLivret','fCash','fCristina','injBoursovie','injCto','injPea','injLivret'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('cristinaSame').checked = false;
    document.getElementById('fCristina').disabled = false;
    document.getElementById('injectionToggle').checked = false;
    document.getElementById('injectionFields').classList.remove('visible');

    await loadData();
  } catch(e) {
    status.className = 'status error';
    status.textContent = 'Erreur: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Mettre à jour';
  }
}

function getPeaHoldings() {
  const stored = localStorage.getItem('epargne_pea_holdings');
  if (!stored) {
    savePeaHoldings(PEA_DEFAULTS);
    return PEA_DEFAULTS;
  }
  // Backfill purchasePrice from defaults for any holding missing it (older stored versions)
  const holdings = JSON.parse(stored).map(h => {
    if (h.purchasePrice > 0) return h;
    const def = PEA_DEFAULTS.find(d => d.ticker === h.ticker);
    return def ? { ...h, purchasePrice: def.purchasePrice } : h;
  });
  savePeaHoldings(holdings);
  return holdings;
}
function savePeaHoldings(h) {
  localStorage.setItem('epargne_pea_holdings', JSON.stringify(h));
}

function toGFTicker(yahooTicker) {
  if (yahooTicker.endsWith('.PA')) return 'EURONEXT:' + yahooTicker.slice(0, -3);
  if (yahooTicker.endsWith('.LS')) return 'ELI:' + yahooTicker.slice(0, -3);
  return yahooTicker;
}

async function fetchPricesViaGoogleSheets(tickers) {
  // Uses GOOGLEFINANCE formulas in a scratch column of the target sheet
  const cfg = getConfig();
  if (!cfg.targetId || !accessToken) return null;
  try {
    const scratchRange = `'${cfg.targetTab}'!Z1:Z${tickers.length}`;
    const formulas = tickers.map(t => [`=GOOGLEFINANCE("${toGFTicker(t)}","price")`]);
    await sheetsUpdate(cfg.targetId, scratchRange, formulas);
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${cfg.targetId}/values/${encodeURIComponent(scratchRange)}?valueRenderOption=UNFORMATTED_VALUE`;
    // Poll until all GOOGLEFINANCE formulas have evaluated (max ~15s)
    for (let attempt = 0; attempt < 5; attempt++) {
      await new Promise(r => setTimeout(r, 3000));
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
      if (!res.ok) return null;
      const data = await res.json();
      const values = (data.values || []).map(r => parseFloat(r[0]) || null);
      if (values.filter(v => v !== null).length >= Math.ceil(tickers.length * 0.8)) {
        return values;
      }
    }
    // Final read
    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
    if (!res.ok) return null;
    const data = await res.json();
    return (data.values || []).map(r => parseFloat(r[0]) || null);
  } catch(e) {
    console.warn('Google Sheets price fetch failed:', e.message);
    return null;
  }
}

async function fetchPriceYahoo(ticker) {
  const urls = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`,
  ];
  for (const base of urls) {
    for (const url of [base, `https://corsproxy.io/?${encodeURIComponent(base)}`]) {
      try {
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        const price = data?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if (price) return price;
      } catch {}
    }
  }
  return null;
}

async function refreshPeaModal() {
  const holdings = getPeaHoldings();
  const st = document.getElementById('peaFetchStatus');
  const listEl = document.getElementById('peaHoldingsList');

  if (holdings.length === 0) {
    listEl.innerHTML = '<p style="color:var(--text2);font-size:13px;padding:8px 0">Aucun titre.</p>';
    document.getElementById('peaTotalLine').textContent = '';
    st.textContent = '';
    return;
  }

  st.textContent = 'Récupération des cours via Google Finance...';

  // Primary: Google Finance via Sheets API (requires OAuth)
  // Fallback: Yahoo Finance
  let prices = await fetchPricesViaGoogleSheets(holdings.map(h => h.ticker));
  const usedGoogleFinance = prices && prices.some(p => p !== null);
  if (!usedGoogleFinance) {
    st.textContent = 'Google Finance indisponible, essai Yahoo Finance...';
    prices = await Promise.all(holdings.map(h => fetchPriceYahoo(h.ticker)));
  }

  // Table header
  let html = `<div style="display:grid;grid-template-columns:1fr auto auto auto auto;gap:6px 12px;align-items:center;padding:6px 0;border-bottom:1px solid var(--surface2);font-size:11px;color:var(--text2);font-weight:600">
    <span>NOM</span>
    <span style="text-align:right">PRIX</span>
    <span style="text-align:right">GAIN</span>
    <span style="text-align:right">VALEUR</span>
    <span></span>
  </div>`;

  let total = 0;
  let totalGain = 0;
  let anyMissing = false;

  holdings.forEach((h, i) => {
    const price = prices[i];
    const val   = price !== null ? price * h.qty : null;
    const gain  = (price !== null && h.purchasePrice > 0)
                  ? (price - h.purchasePrice) * h.qty : null;
    const gainPct = (gain !== null && h.purchasePrice > 0)
                  ? ((price - h.purchasePrice) / h.purchasePrice * 100).toFixed(2) : null;

    if (val  !== null) total     += val;
    if (gain !== null) totalGain += gain;
    if (val  === null) anyMissing = true;

    const gainColor = gain === null ? 'var(--text2)' : (gain >= 0 ? 'var(--green)' : 'var(--red)');
    const gainStr   = gain === null ? '—'
                    : `${gain >= 0 ? '+' : ''}${fmt(gain)}<br><span style="font-size:10px">${gain >= 0 ? '+' : ''}${gainPct}%</span>`;

    html += `<div style="display:grid;grid-template-columns:1fr auto auto auto auto;gap:6px 12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--surface2)20;font-size:13px">
      <div>
        <div style="font-weight:500">${h.name}</div>
        <div style="font-size:10px;color:var(--text2)">${h.ticker} · ${h.qty} parts${h.purchasePrice > 0 ? ` · px: ${h.purchasePrice.toFixed(2)}€` : ''}</div>
      </div>
      <span style="text-align:right;white-space:nowrap">${price !== null ? price.toFixed(2)+'€' : '—'}</span>
      <span style="text-align:right;color:${gainColor};white-space:nowrap;line-height:1.4">${gainStr}</span>
      <span style="text-align:right;font-weight:600;white-space:nowrap">${val !== null ? fmt(val) : '—'}</span>
      <button class="pea-remove-btn" onclick="removePeaHolding(${i})" title="Supprimer">×</button>
    </div>`;
  });

  listEl.innerHTML = html;

  const totalGainColor = totalGain >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('peaTotalLine').innerHTML =
    `<span style="color:var(--text2);font-weight:400;font-size:13px">Total PEA</span>
     &nbsp; ${fmt(total)}
     &nbsp; <span style="font-size:13px;color:${totalGainColor}">${totalGain >= 0 ? '+' : ''}${fmt(totalGain)}</span>`;

  const source = usedGoogleFinance ? 'Google Finance' : 'Yahoo Finance';
  st.textContent = anyMissing
    ? `Certains cours indisponibles via ${source}.`
    : `Cours mis à jour (${source}) · ${new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'})}`;
}
